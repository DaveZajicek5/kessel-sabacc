name: Apply discard incident guard

on:
  push:
    branches: [agent/discard-incident-guard]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/discard-incident-guard
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply patch
        run: python scripts/apply-discard-incident-guard.py
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Commit validated guard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/build.ts src/App.tsx src/main.tsx src/styles.css src/game/debug.ts src/game/engine.ts src/game/__tests__/engine.test.ts
          git commit -m "Guard discard actions and harden turn advancement"
          git push
