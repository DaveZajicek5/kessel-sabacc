name: Diagnose gameplay hotfix

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/atomic-discard-and-impostor-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Show patch failure
        run: |
          awk '
            /python <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-hotfix.yml > /tmp/apply-hotfix.py
          set +e
          python /tmp/apply-hotfix.py > /tmp/hotfix.log 2>&1
          status=$?
          tail -n 20 /tmp/hotfix.log
          exit $status
