name: Run gameplay hotfix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/atomic-discard-and-impostor-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract and apply hotfix script
        run: |
          awk '
            /python <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-hotfix.yml > /tmp/apply-hotfix.py
          python /tmp/apply-hotfix.py
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Commit hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-hotfix.yml .github/workflows/apply-hotfix-pr.yml
          git add src/App.tsx src/game/engine.ts src/game/ai.ts src/game/__tests__/engine.test.ts
          git commit -m "Make discard draws atomic and clarify Impostor doubles"
          git push
