name: Persist gameplay hotfix error

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/atomic-discard-and-impostor-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Save patch error
        run: |
          if [ -f hotfix-error.txt ]; then
            echo "Diagnostic already saved."
            exit 0
          fi
          set +e
          python scripts/apply-gameplay-hotfix.py > hotfix-error.txt 2>&1
          status=$?
          echo "exit_status=$status" >> hotfix-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hotfix-error.txt
          git commit -m "Save gameplay hotfix diagnostic"
          git push
