name: Apply gameplay hotfix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/atomic-discard-and-impostor-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply source hotfix
        run: |
          sed -i 's/end = text.index("\\n\\n});", start)/end = text.rindex("\\n});")/' scripts/apply-gameplay-hotfix.py
          python scripts/apply-gameplay-hotfix.py
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Commit hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-hotfix.yml .github/workflows/apply-hotfix-pr.yml scripts/apply-gameplay-hotfix.py scripts/diagnose-hotfix.sh hotfix-error.txt
          git add src/App.tsx src/game/engine.ts src/game/ai.ts src/game/__tests__/engine.test.ts
          git commit -m "Make discard draws atomic and clarify Impostor doubles"
          git push
