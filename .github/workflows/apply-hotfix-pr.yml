name: Diagnose gameplay hotfix

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/atomic-discard-and-impostor-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Show patch failure
        run: bash scripts/diagnose-hotfix.sh
